[package]
name = "win-receiver"
version = "0.1.0"
edition = "2021"

[dependencies]
protocol = { path = "../protocol" }

# `windows` crate'i YALNIZCA Windows hedefinde çözülür/derlenir.
# macOS'ta bu satır yok sayılır, indirilmez.
[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = ["Win32_UI_Input_KeyboardAndMouse", "Win32_Foundation"] }
