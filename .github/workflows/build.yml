name: build

# Cloud build/packaging: produces the .msi + .dmg without physical Windows/Mac machines.
# - workflow_dispatch: manual trigger (gh workflow run build.yml)
# - tag v*: additionally creates a GitHub Release with the installers attached
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Fast, cheap validation (Linux): compile the whole workspace + run tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --verbose

  # macOS: release build -> keyboard-it.app -> .dmg (native package.sh).
  macos:
    runs-on: macos-14 # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package .app + .dmg
        run: bash packaging/mac/package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  # Windows: build win-receiver FIRST (verifies the Slint/tray code compiles),
  # THEN package the .msi with cargo-wix. WiX v3 ships preinstalled on the windows runner.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build win-receiver (Slint compile check)
        run: cargo build --release -p win-receiver
      - name: Install cargo-wix
        run: cargo install cargo-wix --locked
      - name: Package .msi
        run: cargo wix --package win-receiver --no-build --nocapture
      # cargo-wix derives the output name from the package name (win-receiver-<version>-x86_64.msi);
      # rename to keyboard-it-<version>-x64.msi so it carries the same product name as the dmg
      # and the site links.
      - name: Rename .msi to product name
        shell: pwsh
        run: Get-Item target/wix/*.msi | Rename-Item -NewName { $_.Name -replace '^win-receiver','keyboard-it' -replace 'x86_64','x64' }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/wix/*.msi
          if-no-files-found: error

  # Only on v* tags: attach the installers to a Release.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # Keep the site's 'releases/latest/download/<fixed-name>' links version-independent:
      # upload fixed-name copies ALONGSIDE the versioned files.
      - name: Fixed-name copies (for latest/download links)
        run: |
          mkdir -p latest
          cp artifacts/macos-dmg/keyboard-it-*.dmg latest/keyboard-it-macos.dmg
          cp artifacts/windows-msi/keyboard-it-*-x64.msi latest/keyboard-it-windows-x64.msi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            latest/*
          generate_release_notes: true
