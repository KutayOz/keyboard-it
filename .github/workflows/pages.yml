name: pages

# site/ klasörünü GitHub Pages'e yayımlar (birincil dağıtım adresi).
# Neden GitHub Pages: *.pages.dev Türkiye'de ISS seviyesinde SNI filtresine
# takılıyor; github.io erişilebilir. Cloudflare Pages kopyası yedek olarak durur.
on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek deploy: üst üste push'ta eskisi iptal edilir.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # downloads/ repoda boştur (.gitkeep); indirme linkleri GitHub Releases'e
      # gittiği için binary taşınmaz — site küçük ve hızlı deploy olur.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
