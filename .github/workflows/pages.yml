name: pages

# Publishes site/ to GitHub Pages (primary distribution URL).
# Why GitHub Pages: *.pages.dev is SNI-blocked by Turkish ISPs; github.io is reachable.
on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time: a newer push cancels the in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # downloads/ is empty in the repo (.gitkeep); download links point to GitHub
      # Releases, so no binaries are shipped — the site stays small and deploys fast.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
